<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapnTrack Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F0F4FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .header {
      background: #1A56A0;
      padding: 32px;
      text-align: center;
    }
    .header h1 { color: white; font-size: 26px; font-weight: 700; }
    .header p  { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 6px; }
    .body { padding: 32px; }
    label { display: block; font-size: 13px; color: #333; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #DDD;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border 0.15s;
    }
    input:focus { border-color: #1A56A0; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #1A56A0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #1245A0; }
    .error {
      background: #FEF2F2;
      color: #C0392B;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid #FECACA;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>TapnTrack</h1>
      <p>Admin Dashboard</p>
    </div>
    <div class="body">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <label>Username</label>
        <input type="text" name="username" autofocus>
        <label>Password</label>
        <input type="password" name="password">
        <button class="btn" type="submit">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
