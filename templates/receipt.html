<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Receipt — {{ store_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F0F4FF; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .header {
      width: 100%; background: #1A56A0; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo { color: white; font-size: 20px; font-weight: 700; }
    .header-logo span { color: #7EC8FF; }
    .header-store { color: rgba(255,255,255,0.75); font-size: 13px; }
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin: 24px 16px; width: calc(100% - 32px); max-width: 480px; overflow: hidden;
    }
    .card-header { background: #1A56A0; padding: 20px 24px; color: white; }
    .card-header h2 { font-size: 18px; font-weight: 600; }
    .card-header p { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .tap-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #E8F5E9; color: #27AE60;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; margin-top: 8px;
    }
    .tap-dot {
      width: 8px; height: 8px; background: #27AE60;
      border-radius: 50%; animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
    .pdf-container { width: 100%; height: 65vh; background: #F8F9FA; }
    .pdf-container iframe { width: 100%; height: 100%; border: none; }
    .pdf-fallback {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 32px; text-align: center;
    }
    .pdf-icon { font-size: 48px; margin-bottom: 16px; }
    .pdf-fallback p { color: #555; font-size: 14px; margin-bottom: 20px; }
    .actions { padding: 16px 24px 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 120px; padding: 12px 16px; border-radius: 10px;
      font-size: 14px; font-weight: 600; text-align: center;
      text-decoration: none; cursor: pointer; border: none;
    }
    .btn-primary  { background: #1A56A0; color: white; }
    .btn-secondary { background: #EEF4FF; color: #1A56A0; }
    .footer { margin-top: auto; padding: 20px; text-align: center; color: #999; font-size: 12px; }
    .footer a { color: #1A56A0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">Tap<span>n</span>Track</div>
    <div class="header-store">{{ store_name }}</div>
  </div>
  <div class="card">
    <div class="card-header">
      <h2>Your Receipt</h2>
      <p>{{ created }} UTC &mdash; {{ store_name }}</p>
      <div class="tap-badge"><div class="tap-dot"></div> Receipt ready</div>
    </div>
    <div class="pdf-container" id="pdfContainer">
      <iframe src="{{ s3_url }}" id="pdfFrame" title="Receipt PDF"></iframe>
      <div class="pdf-fallback" id="pdfFallback">
        <div class="pdf-icon">🧾</div>
        <p>Tap the button below to view or download your receipt.</p>
        <a href="{{ s3_url }}" class="btn btn-primary" target="_blank">View Receipt PDF</a>
      </div>
    </div>
    <div class="actions">
      <a href="{{ s3_url }}" class="btn btn-primary" download>⬇ Download PDF</a>
      <button class="btn btn-secondary" onclick="shareReceipt()">↑ Share</button>
    </div>
  </div>
  <div class="footer">Powered by <a href="https://tapntrack.com" target="_blank">TapnTrack</a> — Paperless receipts</div>
  <script>
    const frame = document.getElementById("pdfFrame");
    const fallback = document.getElementById("pdfFallback");
    frame.addEventListener("error", () => { frame.style.display="none"; fallback.style.display="flex"; });
    if (/iPhone|iPad|Android/i.test(navigator.userAgent)) { frame.style.display="none"; fallback.style.display="flex"; }
    function shareReceipt() {
      if (navigator.share) {
        navigator.share({ title: "My Receipt from {{ store_name }}", url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => alert("Link copied!"));
      }
    }
  </script>
</body>
</html>
