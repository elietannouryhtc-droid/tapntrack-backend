<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>

      background: #F0F4FF; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 32px; max-width: 400px; width: 100%; text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h2 { color: #1A56A0; font-size: 22px; margin-bottom: 12px; }
    p { color: #666; font-size: 14px; line-height: 1.6; }
    .footer { margin-top: 32px; color: #999; font-size: 12px; }
    .footer a { color: #1A56A0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⏰</div>
    <h2>Receipt Expired</h2>
    <p>This receipt link has expired after 24 hours.<br>Please ask the store for a new copy if needed.</p>
  </div>
  <div class="footer">Powered by <a href="https://tapntrack.com">TapnTrack</a></div>
